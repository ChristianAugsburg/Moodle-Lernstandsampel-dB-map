<p>
<script>
  // =========================================================================
  // KONFIGURATION
  // =========================================================================
  window.APP_CONFIG = {
      DATENBANK_MODUL_ID: "", 
      LERNLANDKARTE_ID: "",    
      FELD_AUFGABE: "Aufgabe", 
      FELD_STATUS: "Status"
  };
</script>
</p>

<div id="status-accordion" class="card shadow-sm border-0 mb-3" style="border-left: 5px solid #0055a5 !important; background: #fff;">
<div class="card-header bg-white p-0">
<div class="w-100 text-start d-flex justify-content-between align-items-center py-2 px-3">
    <span class="text-primary fw-bold" style="font-size: 0.9rem;">🚀 Mein Lernfortschritt</span> 
    <span id="load-info" class="badge bg-light text-muted border" style="font-size: 0.7rem;">Scan...</span>
</div>
</div>
<div class="card-body p-0">
<div id="dashboard-content" class="list-group list-group-flush"></div>
<div id="teacher-zone" class="p-2 bg-light border-top" style="display: none;">
    <div id="id-finder-box" class="alert alert-info p-2 mb-2" style="display:none; font-size:0.7rem; border: 1px dashed #0055a5;">
      <strong>🛠️ Admin-Konfiguration:</strong><br>
      IDs gefunden! Kopiere diese Zeilen oben in dein Skript:<br>
      <code id="config-copy-field" style="display:block; background:#eee; padding:5px; margin-top:5px; cursor:pointer; font-family:monospace;" onclick="copyConfig()">...</code>
    </div>
    <button onclick="toggleTeacherView()" class="btn btn-sm btn-outline-secondary w-100">👨‍🏫 Auswertung & Admin</button>
    <div id="teacher-auswertung" class="mt-2" style="display: none;"></div>
</div>
</div>
</div>

<p>
<script>
(function() {
  const CONFIG = window.APP_CONFIG;
  window.teacherData = {}; 
  const isTeacher = !!document.querySelector('a[href*="templates.php"]') || document.body.classList.contains('editing');

  function deepScanIDs() {
      const wasEmpty = (!CONFIG.DATENBANK_MODUL_ID || !CONFIG.LERNLANDKARTE_ID);
      
      const findInMenu = (selector, keywords) => {
          // Sucht in allen Links der Seite nach den Modulen
          const links = Array.from(document.querySelectorAll(`a[href*="${selector}"]`));
          const match = links.find(a => keywords.some(k => a.innerText.toLowerCase().includes(k.toLowerCase())));
          return match ? match.href.match(/id=(\d+)/)[1] : (links.length > 0 ? links[0].href.match(/id=(\d+)/)[1] : null);
      };

      const foundDB = findInMenu('/mod/data/', ["ampel", "lernstand", "fortschritt", "bewertung"]);
      const foundMap = findInMenu('/mod/learningmap/', ["landkarte", "map", "weg", "plan"]);

      if (!CONFIG.DATENBANK_MODUL_ID) CONFIG.DATENBANK_MODUL_ID = foundDB;
      if (!CONFIG.LERNLANDKARTE_ID) CONFIG.LERNLANDKARTE_ID = foundMap;

      if (isTeacher && foundDB && foundMap && wasEmpty) {
          document.getElementById('teacher-zone').style.display = 'block';
          const box = document.getElementById('id-finder-box');
          const code = document.getElementById('config-copy-field');
          box.style.display = 'block';
          code.innerText = `DATENBANK_MODUL_ID: "${foundDB}",\nLERNLANDKARTE_ID: "${foundMap}",`;
      }
      return (CONFIG.DATENBANK_MODUL_ID && CONFIG.LERNLANDKARTE_ID);
  }

  window.copyConfig = function() {
      const text = document.getElementById('config-copy-field').innerText;
      navigator.clipboard.writeText(text);
      alert("Config kopiert! Jetzt oben im Skript einfügen.");
  };

  async function getFieldMapping(fDoc) {
      const mapping = { aufgabe: null, status: null };
      fDoc.querySelectorAll('label').forEach(label => {
          const text = label.innerText.toLowerCase();
          const forId = label.getAttribute('for');
          const input = forId ? fDoc.getElementById(forId) : null;
          if (input && input.name?.startsWith('field_')) {
              if (text.includes(CONFIG.FELD_AUFGABE.toLowerCase())) mapping.aufgabe = input.name;
              if (text.includes(CONFIG.FELD_STATUS.toLowerCase())) mapping.status = input.name;
          }
      });
      return mapping;
  }

  async function loadDashboard() {
    const content = document.getElementById('dashboard-content');
    const info = document.getElementById('load-info');
    let myLatest = {};

    try {
        const currentUserName = document.querySelector('.userbutton .usertext')?.innerText?.trim();
        const dbRes = await fetch(`${window.location.origin}/mod/data/view.php?id=${CONFIG.DATENBANK_MODUL_ID}`);
        const dbDoc = new DOMParser().parseFromString(await dbRes.text(), 'text/html');
        
        dbDoc.querySelectorAll('.db-reihe').forEach(row => {
            const user = row.querySelector('.db-user')?.innerText.trim();
            const task = row.querySelector('.db-task')?.innerText.trim();
            const status = row.querySelector('.db-status')?.innerText.trim();
            if (user && task) {
                if (!window.teacherData[user]) window.teacherData[user] = {};
                window.teacherData[user][task] = status;
                if (user === currentUserName || user === "Ich" || !currentUserName) {
                    myLatest[task] = status;
                }
            }
        });

        if (dbDoc.querySelector('a[href*="templates.php"]')) document.getElementById('teacher-zone').style.display = 'block';

        const mapRes = await fetch(`${window.location.origin}/mod/learningmap/view.php?id=${CONFIG.LERNLANDKARTE_ID}`);
        const mapDoc = new DOMParser().parseFromString(await mapRes.text(), 'text/html');
        
        const places = mapDoc.querySelectorAll('.learningmap-place.learningmap-reachable, .learningmap-place.learningmap-visited');
        let allTasks = [];
        places.forEach(p => {
            const txt = mapDoc.querySelector('#title'+p.id)?.textContent || mapDoc.querySelector('#text'+p.id)?.textContent;
            if (txt && txt.trim().length > 2) {
                let name = txt.trim().split('\n')[0];
                if (!allTasks.includes(name)) allTasks.push(name);
            }
        });

        // --- SORTIERUNG ---
        // Alphabetische/Numerische Sortierung der Aufgaben aus der Landkarte
        allTasks.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));

        const isMap = window.location.href.includes('learningmap') || window.location.href.includes(CONFIG.LERNLANDKARTE_ID);
        let tasksToShow = isMap ? allTasks : [];

        if (!isMap) {
           // Nur Titel und Hauptüberschrift durchsuchen, da das Navigationsmenü im body sonst alle Aufgaben auflistet
            const pageHeading = document.querySelector('h1') ? document.querySelector('h1').innerText : "";
            const searchArea = (document.title + " " + pageHeading).toLowerCase();
            // Längsten passenden Treffer nehmen, um Fehler bei ähnlichen Aufgabennamen zu vermeiden
            const found = allTasks.filter(t => searchArea.includes(t.toLowerCase())).sort((a, b) => b.length - a.length)[0];
            tasksToShow = found ? [found] : [];
        }

        info.innerText = tasksToShow.length > 1 ? "Alle ("+tasksToShow.length+")" : "Fokus";

        let html = "";
        tasksToShow.forEach(txt => {
            const status = myLatest[txt] || localStorage.getItem('moodle_status_' + CONFIG.DATENBANK_MODUL_ID + '_' + txt);
            const op = (s, target) => (s ? (s === target ? '1' : '0.2') : '1');
            html += `
              <div class="list-group-item d-flex align-items-center justify-content-between px-3 py-2 border-0 border-bottom">
                <div style="font-size:0.75rem; font-weight:bold; flex:1; padding-right:5px; line-height:1.2;">${txt}</div>
                <div class="btn-group">
                  <button onclick="save('${txt}','🔴',this)" class="btn btn-sm border" style="background:${status==='🔴'?'#f8d7da':'#fff'}; opacity:${op(status,'🔴')};">🔴</button>
                  <button onclick="save('${txt}','🟠',this)" class="btn btn-sm border" style="background:${status==='🟠'?'#fff3cd':'#fff'}; opacity:${op(status,'🟠')};">🟠</button>
                  <button onclick="save('${txt}','🟢',this)" class="btn btn-sm border" style="background:${status==='🟢'?'#d4edda':'#fff'}; opacity:${op(status,'🟢')};">🟢</button>
                </div>
              </div>`;
        });
        content.innerHTML = html || "<div class='p-3 small text-muted'>Keine Aufgabe erkannt.</div>";

    } catch (e) { info.innerText = "Fehler"; console.error(e); }
  }

  window.save = async function(task, emo, btn) {
    btn.innerHTML = "⏳";
    try {
        const res = await fetch(`${window.location.origin}/mod/data/view.php?id=${CONFIG.DATENBANK_MODUL_ID}`);
        const dId = (await res.text()).match(/[?&]d=(\d+)/)[1];
        const fRes = await fetch(`${window.location.origin}/mod/data/edit.php?d=${dId}`);
        const fDoc = new DOMParser().parseFromString(await fRes.text(), 'text/html');
        const mapping = await getFieldMapping(fDoc);
        const fd = new FormData();
        fDoc.querySelectorAll('input[type="hidden"]').forEach(i => fd.append(i.name, i.value));
        fd.append(mapping.aufgabe, task);
        fd.append(mapping.status, emo);
        fd.append('saveandview', 'Speichern');
        await fetch(`${window.location.origin}/mod/data/edit.php?d=${dId}`, { method: 'POST', body: fd });
        localStorage.setItem('moodle_status_' + CONFIG.DATENBANK_MODUL_ID + '_' + task, emo);
        btn.innerHTML = emo;
        btn.style.background = (emo === '🟢' ? '#d4edda' : (emo === '🔴' ? '#f8d7da' : '#fff3cd'));
        btn.parentElement.querySelectorAll('button').forEach(b => b.style.opacity = (b === btn ? "1" : "0.2"));
    } catch (e) { btn.innerHTML = "❌"; }
  };

  window.toggleTeacherView = function() {
      const div = document.getElementById('teacher-auswertung');
      div.style.display = div.style.display === 'none' ? 'block' : 'none';
      let h = '<div class="list-group mt-2">';
      // Sortiere auch die Schülernamen alphabetisch
      const users = Object.keys(window.teacherData).sort();
      users.forEach(u => {
          h += `<div class="list-group-item bg-primary text-white p-1 px-2 small">${u}</div>`;
          // Sortiere die Aufgaben des Schülers
          const tasks = Object.keys(window.teacherData[u]).sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));
          tasks.forEach(t => {
              h += `<div class="list-group-item d-flex justify-content-between p-1 px-2 border-0 border-bottom" style="font-size:0.7rem;"><span>${t}</span><span>${window.teacherData[u][t]}</span></div>`;
          });
      });
      div.innerHTML = h + '</div>';
  };

  setTimeout(() => {
    if (deepScanIDs()) {
       loadDashboard();
    } else if (isTeacher) {
       document.getElementById('load-info').innerText = "Konfig nötig";
       document.getElementById('teacher-zone').style.display = 'block';
       document.getElementById('id-finder-box').innerHTML = "❌ <strong>Hinweis:</strong> DeepScan erfolglos. Bitte trage die IDs manuell ein oder benenne die Module eindeutig (z.B. 'Lernstand').";
       document.getElementById('id-finder-box').style.display = 'block';
    }
  }, 1000);
})();
</script>
</p>
